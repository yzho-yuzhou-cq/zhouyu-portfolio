<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky Zhou</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e17; font-family: -apple-system, 'PingFang SC', sans-serif; overflow: hidden; height: 100vh; }

  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 52px;
    background: #0d1117; border-right: 1px solid #21262d;
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 0; z-index: 10;
  }
  .logo {
    font-size: 16px; font-weight: 800; color: #fff;
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, #f39c12, #e74c3c);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px; flex-shrink: 0;
  }
  .nav-btn {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; margin: 3px 0; transition: all 0.15s;
    color: #484f58; border: none; background: none;
    position: relative;
  }
  .nav-btn:hover { background: #161b22; color: #c9d1d9; }
  .nav-btn.active { background: #1a2332; color: #58a6ff; }
  .nav-btn svg { width: 18px; height: 18px; }
  .tooltip {
    display: none; position: absolute; left: 48px; top: 50%;
    transform: translateY(-50%); background: #21262d; color: #e0e0e0;
    padding: 4px 10px; border-radius: 4px; font-size: 11px;
    white-space: nowrap; pointer-events: none; z-index: 20;
  }
  .nav-btn:hover .tooltip { display: block; }
  .spacer { flex: 1; }
  .sidebar-label {
    font-size: 9px; color: #30363d; writing-mode: vertical-rl;
    letter-spacing: 2px; margin-bottom: 8px;
  }

  .content { margin-left: 52px; height: 100vh; }
  iframe {
    width: 100%; height: 100%; border: none;
    display: none; background: #0a0e17;
  }
  iframe.active { display: block; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">R</div>

  <button class="nav-btn active" onclick="go('portfolio')" id="btn-portfolio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/>
    </svg>
    <span class="tooltip">Portfolio</span>
  </button>

  <button class="nav-btn" onclick="go('dashboard')" id="btn-dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span class="tooltip">宏观仪表盘</span>
  </button>

  <div class="spacer"></div>
  <div class="sidebar-label">ROCKY</div>
</div>

<div class="content">
  <iframe src="portfolio.html" class="active" id="frame-portfolio"></iframe>
  <iframe src="dashboard.html" id="frame-dashboard"></iframe>
</div>

<script>
function go(page) {
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('frame-' + page).classList.add('active');
  document.getElementById('btn-' + page).classList.add('active');
}

// Load dashboard iframe lazily on first click
let dashLoaded = false;
document.getElementById('btn-dashboard').addEventListener('click', () => {
  if (!dashLoaded) {
    document.getElementById('frame-dashboard').src = 'dashboard.html';
    dashLoaded = true;
  }
});
// Pre-set src for portfolio (loads immediately)
</script>
</body>
</html>
